name: CI
on:
  push: { branches: [master] }
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20]
    runs-on: ${{ matrix.os }}
    defaults:
      run: { shell: bash }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}' }

      - name: Install jq (bash statusline dependency)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then brew install jq || true;
          else sudo apt-get update && sudo apt-get install -y jq; fi

      - name: Fetch upstream scripts (not committed)
        run: node scripts/fetch-source.js

      - name: Simulate install (postinstall chmod)
        run: node scripts/postinstall.cjs

      - name: Render invocation (end-to-end)
        run: |
          node bin/cc-statusline.cjs render < test/sample.json | tee out.txt
          grep -q "Sonnet 5" out.txt

      - name: Setup deep-merge into settings.json
        run: |
          export HOME="$RUNNER_TEMP/fakehome"; export USERPROFILE="$HOME"
          mkdir -p "$HOME/.claude"
          printf '%s' '{"theme":"dark","env":{"FOO":"bar"}}' > "$HOME/.claude/settings.json"
          node bin/cc-statusline.cjs setup
          node test/assert-merge.cjs
